name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Check for secrets
        run: |
          ! grep -rn "AKIA\|BEGIN RSA\|BEGIN PRIVATE\|password\s*=" --include="*.py" --include="*.yml" --include="*.yaml" --include="*.tf" .

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform init
        run: cd terraform && terraform init -backend=false

      - name: Terraform validate
        run: cd terraform && terraform validate

  dbt-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery dbt-external-tables dbt-utils

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: dbt compile
        run: cd dbt && dbt compile --target dev
        env:
          GCP_PROJECT: "placeholder"
          RAW_BUCKET: "placeholder"
