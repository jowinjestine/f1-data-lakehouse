version: 2

models:
  - name: stg_jolpica_results
    description: Cleaned Jolpica race results (1950+)
    columns:
      - name: result_id
        tests: [unique, not_null]
      - name: driver_id
        tests: [not_null]

  - name: stg_jolpica_qualifying
    description: Cleaned Jolpica qualifying results (2003+)
    columns:
      - name: qualifying_id
        tests: [unique, not_null]

  - name: stg_jolpica_pitstops
    description: Cleaned Jolpica pit stop data (2011+)
    columns:
      - name: pitstop_id
        tests: [unique, not_null]

  - name: stg_jolpica_drivers
    description: Jolpica driver information
    columns:
      - name: driver_id
        tests: [not_null]

  - name: stg_jolpica_constructors
    description: Jolpica constructor information
    columns:
      - name: constructor_id
        tests: [not_null]

  - name: stg_jolpica_circuits
    description: Jolpica circuit information
    columns:
      - name: circuit_id
        tests: [not_null]
