version: 2

models:
  - name: stg_laps
    description: Cleaned FastF1 lap data with accurate laps only (2018+)
    columns:
      - name: lap_id
        description: Surrogate key for each lap record
        tests: [unique, not_null]
      - name: year
        tests: [not_null]
      - name: round_number
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: lap_number
        tests: [not_null]
      - name: lap_time_seconds
        description: Lap time converted from timedelta to seconds
      - name: tyre_compound
        description: Tyre compound used (SOFT, MEDIUM, HARD, INTERMEDIATE, WET)

  - name: stg_results
    description: Cleaned FastF1 session results with DNF/DNS handling (2018+)
    columns:
      - name: result_id
        description: Surrogate key for each result
        tests: [unique, not_null]
      - name: finish_status
        description: Normalized finish status (finished, dnf, dns)
        tests:
          - accepted_values:
              values: ['finished', 'dnf', 'dns']

  - name: stg_weather
    description: Cleaned FastF1 weather data with cardinal wind directions (2018+)
    columns:
      - name: wind_cardinal
        description: Cardinal wind direction (N, NE, E, SE, S, SW, W, NW)
      - name: air_temp_celsius
        description: Air temperature in Celsius
      - name: is_raining
        description: Whether rainfall was detected
