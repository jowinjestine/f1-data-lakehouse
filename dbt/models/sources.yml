version: 2

sources:
  - name: f1_streaming
    database: "{{ env_var('GCP_PROJECT', '') }}"
    schema: f1_streaming
    description: OpenF1 live timing data — native BigQuery tables (2023+)
    tables:
      - name: car_data
        description: Car telemetry (RPM, speed, gear, throttle, brake, DRS)
      - name: location
        description: Car GPS position (x, y, z track coordinates)
      - name: laps
        description: Lap timing with sector durations and segment status
      - name: stints
        description: Tyre stints with compound and lap ranges
      - name: weather
        description: Track weather conditions
      - name: position
        description: Driver race position over time
      - name: intervals
        description: Gap to leader and interval to car ahead
      - name: pit
        description: Pit stop events with lane and stop durations
      - name: race_control
        description: Race control messages, flags, penalties, session status
      - name: team_radio
        description: Team radio recording URLs
      - name: drivers
        description: Driver information per session
      - name: sessions
        description: Session metadata (times, circuit, location)
      - name: meetings
        description: Meeting/event metadata
      - name: championship_drivers
        description: Live driver championship standings predictions
      - name: championship_teams
        description: Live team championship standings predictions
      - name: overtakes
        description: Overtake events detected from timing data

  - name: f1_ops
    database: "{{ env_var('GCP_PROJECT', '') }}"
    schema: f1_ops
    description: Operational metadata tables
    tables:
      - name: ingest_runs
        description: Ingest run metadata
      - name: ingest_objects
        description: Per-file ingest metadata
