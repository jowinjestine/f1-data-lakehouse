version: 2

models:
  - name: dim_drivers
    description: Driver dimension from OpenF1 — latest session appearance per driver
    columns:
      - name: driver_number
        description: Official FIA driver number
        tests: [unique, not_null]

  - name: dim_teams
    description: Team dimension from OpenF1 — distinct teams with colours
    columns:
      - name: team_key
        tests: [unique, not_null]

  - name: dim_constructors
    description: Backward-compatible wrapper over dim_teams
    columns:
      - name: constructor_key
        tests: [not_null]

  - name: dim_circuits
    description: Circuit dimension from OpenF1 sessions and meetings
    columns:
      - name: circuit_key
        tests: [unique, not_null]

  - name: fct_race_results
    description: Race results from OpenF1 (2023+)
    columns:
      - name: result_id
        tests: [unique, not_null]

  - name: fct_lap_analysis
    description: Lap-level analysis with tyre and weather data (2023+)
    columns:
      - name: lap_id
        tests: [unique, not_null]

  - name: fct_qualifying
    description: Qualifying results with gap to pole (2023+)
    columns:
      - name: qualifying_id
        tests: [unique, not_null]

  - name: fct_pitstops
    description: Pit stop timing data (2023+)
    columns:
      - name: pit_stop_id
        tests: [unique, not_null]
