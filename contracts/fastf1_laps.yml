name: fastf1_laps
source: fastf1
dataset: laps
schema_version: "1.0"
required_columns:
  - name: driver_number
    type: string
  - name: lap_number
    type: int64
  - name: lap_time
    type: float64
    nullable: true
  - name: sector1_time
    type: float64
    nullable: true
  - name: sector2_time
    type: float64
    nullable: true
  - name: sector3_time
    type: float64
    nullable: true
  - name: compound
    type: string
    nullable: true
  - name: tyre_life
    type: float64
    nullable: true
  - name: is_accurate
    type: bool
    nullable: true
